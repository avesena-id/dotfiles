# 1. SYSTEM & GRAPHICS (True Color Support)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on               # Mengaktifkan scroll dan klik mouse
set -g detach-on-destroy off  # Jangan tutup tmux jika session utama mati
# Memulai penomoran dari 1 (lebih dekat di keyboard)
set -g base-index 1
set -g pane-base-index 1

# 2. KEYBINDINGS UTAMA & SPLIT LAYAR
unbind C-b
set-option -g prefix C-a
set-option -g prefix2 none
bind-key C-a send-prefix

# Reload config dengan mudah
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
# Exit
bind Q kill-session

# Split layar yang jauh lebih mudah diingat:
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Mengubah ukuran panel (Resize) menggunakan pergerakan HJ K L (Vim Motion)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Zoom / Maksimalkan satu panel dengan tombol 'm'
bind -r m resize-pane -Z

# Tutup panel tanpa konfirmasi pertanyaan yes/no yang mengganggu
bind x kill-pane

# 3. VIM COPY MODE MOTION
# Masuk ke mode copy/scroll teks dengan tombol 'v'
unbind v
bind v copy-mode

bind M split-window -v -l 30% \; split-window -h -l 66% \; split-window -h -l 50%

set-window-option -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane # Jangan keluar dari mode copy setelah lepas klik mouse

# 4. QUICK FLOATING POPUPS (Sangat Berguna!)
bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "$SHELL"
bind C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# 5. TMUX PLUGIN MANAGER (TPM) & LOOK
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator' 
set -g @plugin 'tmux-plugins/tmux-battery'

# ==============================================================================
# 6. CONFIG TEMA KOTAK SOLID & TRANSPARAN (GRUVBOX DARK HARD VERSION)
# ==============================================================================
set -g status-position bottom
set -g status-style "bg=default"   # Background utama transparan mengikuti terminal
set -g status-justify "left"

set -g window-status-separator ""  # Menempelkan antar tab agar presisi kotak

# Tampilan Tab Biasa / Tidak Aktif (bg1: #3c3836 & bg2: #504945 dengan text fg0)
set -g window-status-format "#[bg=#3c3836,fg=#fbf1c7] #I #[bg=#504945,fg=#fbf1c7] #W "

# Tampilan Tab yang AKTIF (Kotak Ungu khas Gruvbox: #d3869b, dikombinasikan dengan bg1)
set -g window-status-current-format "#[bg=#d3869b,fg=#1d2021,bold] #I #[bg=#3c3836,fg=#d3869b,bold] #W "

# Sisi Kiri Status Bar: Info Session aktif (Prefix Aktif = Red #fb4934, Normal = Blue #83a598)
set -g status-left-length 100
set -g status-left '#{?client_prefix,#[bg=#fb4934],#[bg=#83a598]}#[fg=#1d2021,bold] #{?client_prefix,󰘳,} #S '

# Sisi Kanan Status Bar (Warna teks fg2: #d5c4a1)
set -g status-right-length 100
set -g status-right "#[fg=#d5c4a1]%H:%M "

# Garis Batas Panel (Border Pane) agar serasi dengan kegelapan Gruvbox Hard
set -g pane-border-style "fg=#3c3836,bg=default"
set -g pane-active-border-style "fg=#83a598,bg=default"

# Inisialisasi plugin manager (Harus berada di baris paling bawah)
run '~/.config/tmux/.tmux/plugins/tpm/tpm'
